services:
  web:
    image: caddy:2-alpine
    container_name: relay-api-check-web
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./frontend:/srv:ro
      - ./deploy/Caddyfile.standalone:/etc/caddy/Caddyfile:ro
    depends_on:
      - proxy
    networks:
      - relay-check-net

  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    image: relay-api-check-proxy:latest
    container_name: relay-api-check-proxy
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080,http://127.0.0.1:8080}
    expose:
      - "8090"
    networks:
      - relay-check-net

networks:
  relay-check-net:
    driver: bridge
